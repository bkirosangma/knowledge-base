name: CI

# Five parallel jobs. Phase 3.C: e2e is chromium + next dev + a Rust
# test_server on :1421 wrapped by scripts/run-e2e.sh — no GTK / WebKitGTK
# / xvfb / dbus / AT-SPI. The four MVP-4 proof-set specs (vault_picker,
# uninitialized_splash, document_create, rename_propagation) run real
# assertions on every PR push against test_server's HTTP invoke surface.
# tauri-plugin-webdriver was dropped in MVP-4.x Phase 3.C Task 5 — the
# init_with_port(4444) fix from 0dbe626 stays in git history as the
# upstream-bug-found-and-fixed artifact, but the plugin itself is gone.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm run test:run

  build:
    name: Production build
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build
        run: npm run build

  rust-checks:
    name: Rust fmt · clippy · test (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    # Owns the Rust quality + integration tier on Linux. Rust compiles 3-5x
    # faster on Ubuntu than macOS, and the watcher_rename_paired test
    # (#[cfg(target_os = "linux")]) actually runs here instead of compiling
    # to nothing.

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux deps + zsh
        # gtk/gdk/glib/cairo/etc. are required just to LINK the crate —
        # tauri-plugin-webdriver's transitive deps (gtk-sys, gdk-sys) pull
        # them in even though we don't run the webview here. Same set the
        # `e2e` job uses, minus xvfb (no runtime display needed for tests).
        # zsh is required because PTY integration tests spawn `zsh -i -l`.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            zsh

      - name: cargo fmt --check
        run: cd src-tauri && cargo fmt -- --check

      - name: cargo clippy --all-targets
        # Non-blocking on warnings (5 pre-MVP-4 lints; promote to `-D warnings`
        # once cleared). See ade2d24 for the list.
        run: cd src-tauri && cargo clippy --all-targets

      - name: cargo test
        # Runs unit (78) + term_pty_integration (3) + term_vault_switch (1)
        # + watcher_integration (4) + watcher_rename_paired (1, linux-only)
        # = 87 tests on Ubuntu (vs 86 on macOS where rename-paired is gated).
        run: cd src-tauri && cargo test

  tauri-build:
    name: Tauri debug bundle (macOS)
    runs-on: macos-latest
    timeout-minutes: 15

    # Verifies the Rust crate compiles against the real macOS bundle surface
    # (the release target). Quality + integration tier (cargo fmt/clippy/test)
    # runs on Ubuntu in `rust-checks` for speed; this job is purely the
    # macOS compile-clean signal.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build Tauri (debug, no-bundle)
        run: npm run tauri -- build --debug --no-bundle

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    # MVP-4.x e2e harness: test_server (axum :1421) + next dev + chromium.
    # No GTK / WebKitGTK / xvfb / dbus / AT-SPI deps — chromium only.
    # See docs/superpowers/plans/2026-05-09-tauri-mvp4x-real-e2e-ci-plan.md
    # for the architecture rationale.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux deps
        # Same set rust-checks uses — required to LINK the crate (axum
        # itself doesn't need them, but the lib crate transitively pulls
        # them in via the Tauri tree even when we only build test_server).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm install --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Pre-build test_server
        # Avoid `cargo run --bin test_server` cold-compile inside the
        # webServer.command (which has a 180s readiness timeout).
        run: cd src-tauri && cargo build --bin test_server

      - name: End-to-end tests (proof set)
        # `--project=chromium` keeps CI's e2e fast and deterministic. The
        # `webkit` project is registered alongside chromium for local
        # pre-release smokes (`npm run test:e2e:webkit`); it surfaces Apple
        # WebKit engine bugs that chromium would miss but is not gated in
        # CI. See playwright.config.ts for context.
        run: |
          npx playwright test --project=chromium \
            e2e/vault_picker.spec.ts \
            e2e/uninitialized_splash.spec.ts \
            e2e/document_create.spec.ts \
            e2e/rename_propagation.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

