name: CI

# Gates every PR (and push to main) on five parallel jobs.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm run test:run

  build:
    name: Production build
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build
        run: npm run build

  rust-checks:
    name: Rust fmt · clippy · test (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    # Owns the Rust quality + integration tier on Linux. Rust compiles 3-5x
    # faster on Ubuntu than macOS, and the watcher_rename_paired test
    # (#[cfg(target_os = "linux")]) actually runs here instead of compiling
    # to nothing.

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux deps + zsh
        # gtk/gdk/glib/cairo/etc. are required just to LINK the crate —
        # tauri-plugin-webdriver's transitive deps (gtk-sys, gdk-sys) pull
        # them in even though we don't run the webview here. Same set the
        # `e2e` job uses, minus xvfb (no runtime display needed for tests).
        # zsh is required because PTY integration tests spawn `zsh -i -l`.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            zsh

      - name: cargo fmt --check
        run: cd src-tauri && cargo fmt -- --check

      - name: cargo clippy --all-targets
        # Non-blocking on warnings (5 pre-MVP-4 lints; promote to `-D warnings`
        # once cleared). See ade2d24 for the list.
        run: cd src-tauri && cargo clippy --all-targets

      - name: cargo test
        # Runs unit (78) + term_pty_integration (3) + term_vault_switch (1)
        # + watcher_integration (4) + watcher_rename_paired (1, linux-only)
        # = 87 tests on Ubuntu (vs 86 on macOS where rename-paired is gated).
        run: cd src-tauri && cargo test

  tauri-build:
    name: Tauri debug bundle (macOS)
    runs-on: macos-latest
    timeout-minutes: 15

    # Verifies the Rust crate compiles against the real macOS bundle surface
    # (the release target). Quality + integration tier (cargo fmt/clippy/test)
    # runs on Ubuntu in `rust-checks` for speed; this job is purely the
    # macOS compile-clean signal.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build Tauri (debug, no-bundle)
        run: npm run tauri -- build --debug --no-bundle

  e2e:
    name: E2E (Ubuntu Tauri webview)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    # Drives the 4 proof-set Playwright specs against a real Tauri webview
    # (WebKitGTK) under xvfb. Hosted macos-latest's tauri-plugin-webdriver
    # never binds :4444 (no graphical user, no accessibility prompt path) —
    # the plugin's primary deps (gtk, glib, webkit2gtk) are Linux-native, so
    # Linux is its natural runtime even though the release target is macOS.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux deps + xvfb + dbus + a11y
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            xvfb \
            dbus-x11 \
            at-spi2-core \
            zsh

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # No explicit `tauri build` step — Playwright's webServer command is
      # `npm run tauri:dev` (see playwright.config.ts), which triggers a
      # different cargo invocation (`cargo run --no-default-features`) than
      # `tauri build --debug`. Building twice would not share artifacts.
      # The macOS `tauri-build` job verifies the release-shaped compile path.

      - name: End-to-end tests (dbus + xvfb)
        env:
          KB_E2E_BACKEND: webdriver
        # WebKitGTK requires a user dbus session to surface its a11y bus
        # (AT-SPI). Hosted runners don't start one, so the webview blocks
        # silently during init and tauri-plugin-webdriver never binds :4444.
        # `dbus-run-session` spawns a temporary session bus for the wrapped
        # process tree; xvfb-run nests inside it for the virtual display.
        run: |
          dbus-run-session -- \
            xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' \
            npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
