name: CI

# Gates every PR (and push to main) on five parallel jobs. The e2e job
# was dropped in MVP-4 after tauri-plugin-webdriver 0.2.1 appeared to
# fail to bind :4444 across 4 headless-CI configurations (macOS
# WKWebView; Ubuntu WebKitGTK + xvfb; +dbus; +AT-SPI). MVP-4.x Phase 1
# read the plugin source and found the real cause: the plugin's
# DEFAULT_PORT is :4445, not :4444 — the bind was succeeding silently
# while Playwright polled the wrong port. Fixed in commit 0dbe626 by
# pinning the plugin to :4444 via init_with_port(4444). With that
# unblocked, this job is restored so the four MVP-4 proof-set specs
# (vault_picker, uninitialized_splash, document_create, rename_propagation)
# run real assertions on every PR push.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm run test:run

  build:
    name: Production build
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build
        run: npm run build

  rust-checks:
    name: Rust fmt · clippy · test (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    # Owns the Rust quality + integration tier on Linux. Rust compiles 3-5x
    # faster on Ubuntu than macOS, and the watcher_rename_paired test
    # (#[cfg(target_os = "linux")]) actually runs here instead of compiling
    # to nothing.

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux deps + zsh
        # gtk/gdk/glib/cairo/etc. are required just to LINK the crate —
        # tauri-plugin-webdriver's transitive deps (gtk-sys, gdk-sys) pull
        # them in even though we don't run the webview here. Same set the
        # `e2e` job uses, minus xvfb (no runtime display needed for tests).
        # zsh is required because PTY integration tests spawn `zsh -i -l`.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            zsh

      - name: cargo fmt --check
        run: cd src-tauri && cargo fmt -- --check

      - name: cargo clippy --all-targets
        # Non-blocking on warnings (5 pre-MVP-4 lints; promote to `-D warnings`
        # once cleared). See ade2d24 for the list.
        run: cd src-tauri && cargo clippy --all-targets

      - name: cargo test
        # Runs unit (78) + term_pty_integration (3) + term_vault_switch (1)
        # + watcher_integration (4) + watcher_rename_paired (1, linux-only)
        # = 87 tests on Ubuntu (vs 86 on macOS where rename-paired is gated).
        run: cd src-tauri && cargo test

  tauri-build:
    name: Tauri debug bundle (macOS)
    runs-on: macos-latest
    timeout-minutes: 15

    # Verifies the Rust crate compiles against the real macOS bundle surface
    # (the release target). Quality + integration tier (cargo fmt/clippy/test)
    # runs on Ubuntu in `rust-checks` for speed; this job is purely the
    # macOS compile-clean signal.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build Tauri (debug, no-bundle)
        run: npm run tauri -- build --debug --no-bundle

  e2e:
    name: End-to-end tests (xvfb-wrapped)
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    # Restored in MVP-4.x Phase 3.A. Runs `npm run test:e2e`, which
    # boots `npm run tauri:dev` under Playwright's webServer (the
    # config probes :4444/status — matches the post-fix plugin port).
    # xvfb provides a headless X display; dbus-run-session + at-spi2-core
    # give WebKitGTK the AT-SPI bus it expects so it doesn't error
    # before the WebDriver session attaches.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri Linux system dependencies
        # Same set as the rust-checks job — webkit2gtk + GTK + system libs
        # Tauri links against on Linux. Plus xvfb for headless X, plus
        # dbus-x11 + at-spi2-core so WebKitGTK doesn't error trying to
        # reach the AT-SPI bus.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            pkg-config \
            libssl-dev \
            xvfb \
            dbus-x11 \
            at-spi2-core

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) to match the four existing jobs.
        # The lockfile drifts under newer-npm-locally / older-npm-in-CI;
        # `npm install` reconciles silently while `npm ci` rejects strictly.
        # Tracked as a separate cleanup; not in MVP-4.x scope.
        run: npm install --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (xvfb-wrapped)
        run: xvfb-run -a dbus-run-session -- npm run test:e2e
        env:
          KB_E2E_BACKEND: webdriver

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

