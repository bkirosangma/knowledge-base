name: CI

# Gates every PR (and push to main) on typecheck + lint + test + build.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm run test:run

  # E2E job intentionally disabled in MVP-1a.
  #
  # The repository layer migrated from the File System Access API to Tauri's
  # `invoke()` (see `src/app/knowledge_base/infrastructure/tauriBridge.ts`).
  # The Playwright suite still boots `npm run dev` in vanilla Chromium and
  # uses the FSA-shaped `e2e/fixtures/fsMock.ts`, so every spec now fails
  # with `TypeError: Cannot read properties of undefined (reading 'invoke')`.
  #
  # Restoring e2e is MVP-4's deliverable: spin Playwright against
  # `cargo tauri dev` via `tauri-plugin-webdriver` with `KB_CLAUDE_MODE=stub`
  # (spec `docs/superpowers/specs/2026-05-07-tauri-claude-integration-design.md`
  # § 9). When MVP-4 lands, restore this job (port the steps below from git
  # history at commit ad26115^) and switch the `runs-on` + setup to whatever
  # MVP-4 picks for its driver host.

  build:
    name: Production build
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build
        run: npm run build

  tauri-build:
    name: Tauri debug bundle (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test:run

      - name: Build Tauri (debug, no-bundle)
        run: cargo tauri build --debug --no-bundle
