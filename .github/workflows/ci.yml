name: CI

# Gates every PR (and push to main) on typecheck + lint + test + build.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm run test:run

  build:
    name: Production build
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build
        run: npm run build

  tauri-build:
    name: Tauri debug bundle (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    # Verifies the Rust crate compiles against the real macOS bundle surface.
    # Typecheck + Vitest run in the `checks` job above (Ubuntu) — duplicating
    # them here costs ~3 min for no extra signal on a TypeScript/Vitest stack.
    # `@tauri-apps/cli` is pulled by `npm install` (a precompiled per-platform
    # binary, not a cargo crate), so we don't need `cargo install tauri-cli`
    # (~7 min from-source build) — `npm run tauri` invokes that binary directly.

    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build Tauri (debug, no-bundle)
        run: npm run tauri -- build --debug --no-bundle

      - name: Cargo fmt + clippy + test
        run: |
          cd src-tauri
          cargo fmt -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (Tauri webdriver)
        env:
          # Under the Task 11 fallback this becomes `nextdev`.
          KB_E2E_BACKEND: webdriver
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
